<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PointVis</title>
    <link rel="stylesheet" href="styles.css?v=5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Libre+Baskerville:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
</head>
<body>
    <div class="app-container">
        <button id="toggle-sidebar" class="toggle-btn" title="Toggle Sidebar">
            <svg class="chevron-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>PointVis</h1>
                <p>Click on the grid intersections to add mathematical points.</p>
                
                <div class="mode-toggle">
                    <button id="mode-point" class="mode-btn active" title="Add Point">Add</button>
                    <button id="mode-line" class="mode-btn" title="Connect Points">Line</button>
                    <button id="mode-polygon" class="mode-btn" title="Draw Polygon">Poly</button>
                    <button id="mode-circle" class="mode-btn" title="Draw Circle">Circle</button>
                    <button id="mode-reflect" class="mode-btn" title="Reflect about Point">Reflect</button>
                    <button id="mode-dilate" class="mode-btn" title="Dilate from Point">Dilate</button>
                    <button id="mode-move" class="mode-btn" title="Move Canvas/Points">Move</button>
                </div>
                
                <div id="line-type-container" class="line-type-container hidden">
                    <label for="line-type">Type:</label>
                    <select id="line-type" class="line-type-select">
                        <option value="segment">Segment (Finite)</option>
                        <option value="line">Line (Infinite)</option>
                        <option value="ray">Ray (Half-Infinite)</option>
                        <option value="vector">Vector (Directed)</option>
                        <option value="perp-bisector">Perpendicular Bisector</option>
                        <option value="length">Given Length</option>
                    </select>
                </div>
                
                <div class="best-fit-container">
                    <label>
                        <input type="checkbox" id="best-fit-toggle">
                        Show Best Fit Line
                    </label>
                </div>
                
                <div id="status-hint" class="status-hint hidden"></div>
            </div>
            
            <div class="manual-input-section">
                <label for="manual-point-input">Add Point Manually</label>
                <div class="manual-input-row">
                    <input type="text" id="manual-point-input" class="manual-input" placeholder="e.g. 3, -2" autocomplete="off">
                    <button id="manual-point-add" class="manual-add-btn" title="Add Point">+</button>
                </div>
            </div>
            
            <div class="points-section">
                <h2>Added Points</h2>
                <ul id="points-list" class="points-list">
                    <li class="empty-state">No points added yet.</li>
                </ul>
            </div>
            
            <div class="actions">
                <button id="clearBtn" class="danger">Clear Canvas</button>
                <div class="export-actions">
                    <button id="exportImageBtn" class="secondary">Export PNG</button>
                    <button id="exportCsvBtn" class="secondary">Export CSV</button>
                </div>
            </div>
            
            <div class="credits-section">
                <div class="credits-text">
                    <span class="credits-label">Developed by</span>
                    <span class="credits-name">M0stafa</span>
                </div>
                <div class="social-links">
                    <a href="https://github.com/mostafa-cse/" target="_blank" title="GitHub">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    </a>
                    <a href="https://www.linkedin.com/in/m0stafa-kamal/" target="_blank" title="LinkedIn">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                    </a>
                    <a href="https://vjudge.net/user/M00stafa" target="_blank" title="Vjudge">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                    </a>
                    <a href="https://codeforces.com/profile/...-_-..." target="_blank" title="Codeforces">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14v7M12 10v11M20 6v15"></path></svg>
                    </a>
                </div>
            </div>
        </aside>
        
        <main class="graph-container">
            <div class="canvas-wrapper">
                <canvas id="graph-canvas"></canvas>
                <div id="tooltip" class="tooltip hidden"></div>
            </div>
        </main>
    </div>
    <script src="app.js?v=3"></script>
</body>
</html>
